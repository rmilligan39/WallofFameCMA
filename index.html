<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=2160, initial-scale=1.0">
<meta http-equiv="autoplay" content="true">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<title>Cleveland Museum of Art — Open Collection</title>
<style>
/*
  All sizing uses vw/vh units so this renders correctly
  in both browser preview and on BrightSign 2160×4096 portrait.
  Font sizes are vw-based so they scale with the viewport width.
*/

:root {
  --bg:       #0c0c0b;
  --gold:     #BFA06A;
  --gold-dim: rgba(191,160,106,0.4);
  --cream:    #F0E8D5;
  --muted:    rgba(240,232,213,0.4);
  --subtle:   rgba(240,232,213,0.09);
  --serif:    Georgia, "Times New Roman", serif;
  --sans:     "Helvetica Neue", Helvetica, Arial, sans-serif;
}

*, *::before, *::after {
  -webkit-box-sizing: border-box; box-sizing: border-box;
  margin: 0; padding: 0;
}

html, body {
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: var(--bg);
  color: var(--cream);
  font-family: var(--sans);
  -webkit-user-select: none; user-select: none;
}

/* ── HEADER ── */
#header {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 50;
  padding: 1.5vw 3.5vw 0;
  background: -webkit-linear-gradient(top, rgba(12,12,11,0.97) 65%, transparent 100%);
  background: linear-gradient(to bottom, rgba(12,12,11,0.97) 65%, transparent 100%);
}

.header-top {
  display: -webkit-box; display: -webkit-flex; display: flex;
  -webkit-box-align: center; -webkit-align-items: center; align-items: center;
  -webkit-box-pack: justify; -webkit-justify-content: space-between; justify-content: space-between;
  margin-bottom: 1.2vw;
}

.logo {
  font-family: var(--serif);
  font-size: 1.9vw;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--gold);
  line-height: 1.3;
}
.logo-sub {
  display: block;
  font-family: var(--sans); font-style: normal;
  font-size: 0.9vw; letter-spacing: 0.32em;
  color: var(--muted); text-transform: uppercase;
  margin-top: 0.3vw;
}

.header-right {
  display: -webkit-box; display: -webkit-flex; display: flex;
  -webkit-box-align: center; -webkit-align-items: center; align-items: center;
  gap: 1.4vw;
}

/* ── CLOCK — sized in vw so it scales with viewport ── */
.clock-wrap {
  position: relative;
  width: 5.5vw; height: 5.5vw;
}
.clock-svg {
  width: 5.5vw; height: 5.5vw;
  -webkit-transform: rotate(-90deg); transform: rotate(-90deg);
}
.clock-track { fill: none; stroke: var(--subtle); stroke-width: 2; }
.clock-fill {
  fill: none; stroke: var(--gold); stroke-width: 2; stroke-linecap: round;
  stroke-dasharray: 289; /* 2π × 46 — matches CIRC in JS */
  stroke-dashoffset: 0;
  -webkit-transition: stroke-dashoffset 1s linear; transition: stroke-dashoffset 1s linear;
}
.clock-text {
  position: absolute; top: 0; left: 0; right: 0; bottom: 0;
  display: -webkit-box; display: -webkit-flex; display: flex;
  -webkit-box-align: center; -webkit-align-items: center; align-items: center;
  -webkit-box-pack: center; -webkit-justify-content: center; justify-content: center;
  font-size: 0.95vw; color: var(--gold); letter-spacing: 0.04em;
}

.ctrl-btn {
  background: none; border: 1px solid var(--subtle);
  color: var(--muted);
  width: 4vw; height: 4vw;
  display: -webkit-box; display: -webkit-flex; display: flex;
  -webkit-box-align: center; -webkit-align-items: center; align-items: center;
  -webkit-box-pack: center; -webkit-justify-content: center; justify-content: center;
  cursor: pointer;
  -webkit-border-radius: 50%; border-radius: 50%;
  -webkit-transition: all 0.25s; transition: all 0.25s;
}
.ctrl-btn svg { width: 1.5vw; height: 1.5vw; }
.ctrl-btn:hover { border-color: var(--gold-dim); color: var(--gold); }

/* ── FILTER BAR ── */
#filter-bar {
  display: -webkit-box; display: -webkit-flex; display: flex;
  -webkit-box-align: center; -webkit-align-items: center; align-items: center;
  -webkit-flex-wrap: wrap; flex-wrap: wrap;
  gap: 0.8vw;
  padding-bottom: 1.2vw;
  border-top: 1px solid rgba(191,160,106,0.15);
  padding-top: 0.9vw;
}

.filter-label {
  font-size: 0.85vw; letter-spacing: 0.28em; text-transform: uppercase;
  color: var(--muted); margin-right: 0.3vw; white-space: nowrap;
}

.filter-chip {
  background: none; border: 1px solid rgba(191,160,106,0.2);
  color: var(--muted); padding: 0.45vw 1.4vw;
  font-family: var(--sans); font-size: 0.85vw; letter-spacing: 0.15em;
  text-transform: uppercase; cursor: pointer; white-space: nowrap;
  -webkit-transition: all 0.25s; transition: all 0.25s;
}
.filter-chip:hover  { border-color: var(--gold-dim); color: var(--cream); }
.filter-chip.active { background: var(--gold-dim); border-color: var(--gold); color: var(--gold); }

/* ── STAGE — full viewport ── */
#stage {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  overflow: hidden;
  background: var(--bg);
}

.slide {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  display: -webkit-box; display: -webkit-flex; display: flex;
  -webkit-box-align: center; -webkit-align-items: center; align-items: center;
  -webkit-box-pack: center; -webkit-justify-content: center; justify-content: center;
  opacity: 0;
  -webkit-transition: opacity 1.4s ease; transition: opacity 1.4s ease;
}
.slide.active { opacity: 1; }

.slide-img-wrap {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  display: -webkit-box; display: -webkit-flex; display: flex;
  -webkit-box-align: center; -webkit-align-items: center; align-items: center;
  -webkit-box-pack: center; -webkit-justify-content: center; justify-content: center;
  background: #080807;
}
.slide-img-wrap img {
  max-width: 100%; max-height: 100%;
  width: auto; height: auto;
  display: block; object-fit: contain;
}

.slide-vignette {
  position: absolute; top: 0; left: 0; right: 0; bottom: 0;
  background: -webkit-radial-gradient(center, ellipse cover, transparent 38%, rgba(12,12,11,0.55) 100%);
  background: radial-gradient(ellipse at center, transparent 38%, rgba(12,12,11,0.55) 100%);
  pointer-events: none;
}

/* Taller gradient — portrait viewport has more vertical room */
.slide-gradient {
  position: absolute; bottom: 0; left: 0; right: 0;
  height: 42%;
  background: -webkit-linear-gradient(top, transparent 0%, rgba(12,12,11,0.72) 35%, rgba(12,12,11,0.98) 100%);
  background: linear-gradient(to bottom, transparent 0%, rgba(12,12,11,0.72) 35%, rgba(12,12,11,0.98) 100%);
  pointer-events: none;
}

/* ── DESCRIPTION — centered below image ── */
.slide-desc {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  padding: 3vw 7vw 4.5vw;
  text-align: center;
  z-index: 10;
}

.desc-dept {
  font-family: var(--sans); font-size: 0.95vw; letter-spacing: 0.38em;
  text-transform: uppercase; color: var(--gold); margin-bottom: 0.9vw;
  opacity: 0; -webkit-transform: translateY(1.2vw); transform: translateY(1.2vw);
  -webkit-transition: opacity 0.6s 0.3s ease, -webkit-transform 0.6s 0.3s ease;
  transition: opacity 0.6s 0.3s ease, transform 0.6s 0.3s ease;
}
.desc-title {
  font-family: var(--serif); font-size: 4.5vw; font-weight: 400; line-height: 1.15;
  color: var(--cream); margin-bottom: 0.7vw;
  opacity: 0; -webkit-transform: translateY(1.5vw); transform: translateY(1.5vw);
  -webkit-transition: opacity 0.65s 0.45s ease, -webkit-transform 0.65s 0.45s ease;
  transition: opacity 0.65s 0.45s ease, transform 0.65s 0.45s ease;
}
.desc-artist {
  font-family: var(--serif); font-style: italic; font-size: 2.2vw;
  color: var(--gold); margin-bottom: 0.7vw;
  opacity: 0; -webkit-transform: translateY(1vw); transform: translateY(1vw);
  -webkit-transition: opacity 0.6s 0.55s ease, -webkit-transform 0.6s 0.55s ease;
  transition: opacity 0.6s 0.55s ease, transform 0.6s 0.55s ease;
}
.desc-meta {
  font-family: var(--sans); font-size: 1.2vw; letter-spacing: 0.12em;
  color: var(--muted); margin-bottom: 1.2vw;
  opacity: 0; -webkit-transform: translateY(0.8vw); transform: translateY(0.8vw);
  -webkit-transition: opacity 0.6s 0.65s ease, -webkit-transform 0.6s 0.65s ease;
  transition: opacity 0.6s 0.65s ease, transform 0.6s 0.65s ease;
}
.desc-text {
  max-width: 82%;
  margin: 0 auto;
  font-family: var(--serif); font-size: 1.6vw; line-height: 1.72;
  color: rgba(240,232,213,0.58);
  opacity: 0; -webkit-transform: translateY(0.7vw); transform: translateY(0.7vw);
  -webkit-transition: opacity 0.6s 0.75s ease, -webkit-transform 0.6s 0.75s ease;
  transition: opacity 0.6s 0.75s ease, transform 0.6s 0.75s ease;
}

.slide.active .desc-dept, .slide.active .desc-title,
.slide.active .desc-artist,.slide.active .desc-meta,
.slide.active .desc-text {
  opacity: 1; -webkit-transform: translateY(0); transform: translateY(0);
}

/* ── PROGRESS BAR ── */
#progress-bar {
  position: fixed; bottom: 0; left: 0;
  height: 0.35vh; width: 100%;
  background: var(--gold);
  -webkit-transform-origin: left center; transform-origin: left center;
  -webkit-transform: scaleX(1); transform: scaleX(1);
  z-index: 60;
}

/* ── LOADING ── */
#loading-screen {
  position: fixed; top: 0; left: 0;
  width: 100%; height: 100%;
  z-index: 200;
  background: var(--bg);
  display: -webkit-box; display: -webkit-flex; display: flex;
  -webkit-box-orient: vertical; -webkit-box-direction: normal;
  -webkit-flex-direction: column; flex-direction: column;
  -webkit-box-align: center; -webkit-align-items: center; align-items: center;
  -webkit-box-pack: center; -webkit-justify-content: center; justify-content: center;
  gap: 2.5vw;
  -webkit-transition: opacity 0.8s ease; transition: opacity 0.8s ease;
}
#loading-screen.fade-out { opacity: 0; pointer-events: none; }

.loading-logo {
  font-family: var(--serif); font-size: 4.5vw; font-weight: 400;
  letter-spacing: 0.22em; color: var(--gold); text-transform: uppercase; text-align: center;
  line-height: 1.3;
}
.loading-logo span {
  display: block; font-style: italic; font-size: 1.8vw;
  letter-spacing: 0.1em; color: var(--muted); text-transform: none; margin-top: 0.6vw;
}

.loading-bar-outer {
  width: 22vw; height: 1px; background: var(--subtle);
  position: relative; overflow: hidden;
}
.loading-bar-inner {
  position: absolute; top: 0; left: -100%; width: 100%; height: 100%;
  background: -webkit-linear-gradient(left, transparent, var(--gold), transparent);
  background: linear-gradient(to right, transparent, var(--gold), transparent);
  -webkit-animation: sweep 1.5s ease-in-out infinite; animation: sweep 1.5s ease-in-out infinite;
}
@-webkit-keyframes sweep { 0%{left:-100%} 100%{left:100%} }
@keyframes          sweep { 0%{left:-100%} 100%{left:100%} }

#loading-msg {
  font-family: var(--sans); font-size: 1.1vw; letter-spacing: 0.28em;
  text-transform: uppercase; color: var(--muted); text-align: center;
  max-width: 60vw; line-height: 1.9;
}
#loading-msg.error { color: #d07060; text-transform: none; letter-spacing: 0.05em; }

#btn-retry {
  display: none; background: none; border: 1px solid var(--gold-dim); color: var(--gold);
  padding: 1vw 3vw; font-family: var(--sans); font-size: 1.1vw;
  letter-spacing: 0.2em; text-transform: uppercase; cursor: pointer;
  -webkit-transition: all 0.25s; transition: all 0.25s;
}
#btn-retry:hover { background: var(--gold-dim); }

/* ── DOTS ── */
#dots {
  position: fixed; top: 50%; right: 2vw;
  -webkit-transform: translateY(-50%); transform: translateY(-50%);
  display: -webkit-box; display: -webkit-flex; display: flex;
  -webkit-box-orient: vertical; -webkit-box-direction: normal;
  -webkit-flex-direction: column; flex-direction: column;
  -webkit-box-align: center; -webkit-align-items: center; align-items: center;
  gap: 1.2vw; z-index: 20;
}
.dot {
  width: 0.7vw; height: 0.7vw;
  -webkit-border-radius: 50%; border-radius: 50%;
  background: var(--subtle); cursor: pointer;
  -webkit-transition: background 0.3s, -webkit-transform 0.3s; transition: background 0.3s, transform 0.3s;
}
.dot.active { background: var(--gold); -webkit-transform: scale(1.5); transform: scale(1.5); }

/* ── FOOTER LINKS ── */
#next-btn {
  position: fixed; bottom: 2vw; right: 3.5vw;
  font-family: var(--sans); font-size: 1vw; letter-spacing: 0.2em;
  text-transform: uppercase; color: var(--muted); cursor: pointer; z-index: 20;
  -webkit-transition: color 0.25s; transition: color 0.25s;
}
#next-btn:hover { color: var(--gold); }

#cma-link {
  position: fixed; bottom: 2vw; left: 3.5vw;
  font-family: var(--sans); font-size: 1vw; letter-spacing: 0.2em;
  text-transform: uppercase; color: var(--muted); text-decoration: none; z-index: 20;
  display: none; -webkit-transition: color 0.25s; transition: color 0.25s;
}
#cma-link:hover { color: var(--gold); }

/* ── PAUSE ── */
#pause-overlay {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 30;
  display: -webkit-box; display: -webkit-flex; display: flex;
  -webkit-box-align: center; -webkit-align-items: center; align-items: center;
  -webkit-box-pack: center; -webkit-justify-content: center; justify-content: center;
  pointer-events: none; opacity: 0; -webkit-transition: opacity 0.3s; transition: opacity 0.3s;
}
#pause-overlay.visible { opacity: 1; }
.pause-icon {
  width: 7vw; height: 7vw;
  background: rgba(12,12,11,0.85); border: 1px solid var(--gold-dim);
  -webkit-border-radius: 50%; border-radius: 50%;
  display: -webkit-box; display: -webkit-flex; display: flex;
  -webkit-box-align: center; -webkit-align-items: center; align-items: center;
  -webkit-box-pack: center; -webkit-justify-content: center; justify-content: center;
  font-size: 3vw;
}

/* ── SWITCHING ── */
#switching-overlay {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 100;
  background: var(--bg);
  display: -webkit-box; display: -webkit-flex; display: flex;
  -webkit-box-align: center; -webkit-align-items: center; align-items: center;
  -webkit-box-pack: center; -webkit-justify-content: center; justify-content: center;
  opacity: 0; pointer-events: none;
  -webkit-transition: opacity 0.4s ease; transition: opacity 0.4s ease;
}
#switching-overlay.visible { opacity: 1; pointer-events: all; }
.switching-text {
  font-family: var(--serif); font-style: italic; font-size: 2.5vw;
  color: var(--gold); letter-spacing: 0.1em;
}
</style>
</head>
<body>

<!-- LOADING -->
<div id="loading-screen">
  <div class="loading-logo">
    CMA
    <span>Cleveland Museum of Art &mdash; Open Collection</span>
  </div>
  <div class="loading-bar-outer"><div class="loading-bar-inner"></div></div>
  <div id="loading-msg">Opening the Collection&hellip;</div>
  <button id="btn-retry" onclick="init()">Try Again</button>
</div>

<!-- HEADER -->
<div id="header">
  <div class="header-top">
    <div class="logo">
      Cleveland Museum of Art
      <span class="logo-sub">Open Collection &middot; Digital Gallery</span>
    </div>
    <div class="header-right">
      <div class="clock-wrap">
        <svg class="clock-svg" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
          <circle class="clock-track" cx="50" cy="50" r="46"/>
          <circle class="clock-fill"  id="clock-arc" cx="50" cy="50" r="46"/>
        </svg>
        <div class="clock-text" id="clock-label">2:00</div>
      </div>
      <button class="ctrl-btn" onclick="togglePause()" title="Pause">
        <svg id="pause-icon" viewBox="0 0 24 24" fill="currentColor">
          <rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>
        </svg>
      </button>
      <button class="ctrl-btn" onclick="nextSlide()" title="Next">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="9 18 15 12 9 6"/>
        </svg>
      </button>
    </div>
  </div>

  <div id="filter-bar">
    <span class="filter-label">Filter</span>
    <button class="filter-chip active" data-dept=""                                 onclick="setFilter(this)">All</button>
    <button class="filter-chip"        data-dept="Paintings"                        onclick="setFilter(this)">Paintings</button>
    <button class="filter-chip"        data-dept="Drawings"                         onclick="setFilter(this)">Drawings</button>
    <button class="filter-chip"        data-dept="Prints"                           onclick="setFilter(this)">Prints</button>
    <button class="filter-chip"        data-dept="Decorative Art and Design"        onclick="setFilter(this)">Decorative Arts</button>
    <button class="filter-chip"        data-dept="Photographs"                      onclick="setFilter(this)">Photography</button>
    <button class="filter-chip"        data-dept="Textiles"                         onclick="setFilter(this)">Textiles</button>
    <button class="filter-chip"        data-dept="Egyptian and Ancient Near Eastern Art" onclick="setFilter(this)">Ancient</button>
  </div>
</div>

<!-- STAGE -->
<div id="stage"></div>
<div id="progress-bar"></div>
<div id="dots"></div>
<div id="next-btn" onclick="nextSlide()">Next Work &rsaquo;</div>
<a id="cma-link" href="#" target="_blank">View on CMA &rarr;</a>
<div id="pause-overlay"><div class="pause-icon">&#9646;&#9646;</div></div>
<div id="switching-overlay"><div class="switching-text">Changing collection&hellip;</div></div>

<script>
// ─────────────────────────────────────────────────────────────
// Config — edit DURATION here (seconds)
// ─────────────────────────────────────────────────────────────
var DURATION = 120;
var API      = 'https://openaccess-api.clevelandart.org/api/artworks/';

// SVG clock: viewBox 0 0 100 100, r=46
// circumference = 2π × 46 ≈ 289.0
var CIRC = 2 * Math.PI * 46;

// ─────────────────────────────────────────────────────────────
// State
// ─────────────────────────────────────────────────────────────
var slides      = [];
var currentIdx  = -1;
var isPaused    = false;
var secondsLeft = DURATION;
var timerID     = null;
var preloading  = false;
var activeDept  = '';

// ─────────────────────────────────────────────────────────────
// Utilities
// ─────────────────────────────────────────────────────────────
function esc(s) {
  return String(s || '')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function padTwo(n) { return n < 10 ? '0' + n : '' + n; }

function xhrGet(url, ms) {
  return new Promise(function(resolve, reject) {
    var xhr = new XMLHttpRequest();
    xhr.open('GET', url, true);
    xhr.timeout = ms || 14000;
    xhr.ontimeout = function() { reject(new Error('timeout')); };
    xhr.onerror   = function() { reject(new Error('network error')); };
    xhr.onload = function() {
      if (xhr.status >= 200 && xhr.status < 300) {
        try { resolve(JSON.parse(xhr.responseText)); }
        catch(e) { reject(new Error('parse error')); }
      } else {
        reject(new Error('HTTP ' + xhr.status));
      }
    };
    xhr.send();
  });
}

function preloadImg(src) {
  return new Promise(function(resolve) {
    var done = false;
    var t = setTimeout(function() { if (!done) { done=true; resolve(false); } }, 12000);
    var img = new Image();
    img.onload  = function() { if (!done) { done=true; clearTimeout(t); resolve(true); } };
    img.onerror = function() { if (!done) { done=true; clearTimeout(t); resolve(false); } };
    img.src = src;
  });
}

function bestImage(work) {
  var im = work && work.images;
  if (!im) return null;
  if (im.web   && im.web.url)   return im.web.url;
  if (im.thumb && im.thumb.url) return im.thumb.url;
  return null;
}

function getArtist(work) {
  if (!work.creators || !work.creators.length) return work.culture || '';
  var names = [];
  for (var i = 0; i < work.creators.length; i++) {
    var n = work.creators[i].description || work.creators[i].name || '';
    if (n) names.push(n);
  }
  return names.join(', ');
}

// ─────────────────────────────────────────────────────────────
// Fetch random work
// ─────────────────────────────────────────────────────────────
function fetchRandomWork(attempt) {
  attempt = attempt || 0;
  if (attempt >= 8) return Promise.reject(new Error('8 attempts failed'));

  var skip = Math.floor(Math.random() * 48000);
  var url  = API + '?has_image=1&limit=1&skip=' + skip;
  if (activeDept) url += '&department=' + encodeURIComponent(activeDept);

  return xhrGet(url)
    .then(function(data) {
      var work = data.data && data.data[0];
      if (!work) return fetchRandomWork(attempt + 1);
      var imgUrl = bestImage(work);
      if (!imgUrl) return fetchRandomWork(attempt + 1);
      return preloadImg(imgUrl).then(function(ok) {
        if (!ok) return fetchRandomWork(attempt + 1);
        return { work: work, imgUrl: imgUrl };
      });
    })
    .catch(function() { return fetchRandomWork(attempt + 1); });
}

// ─────────────────────────────────────────────────────────────
// Build slide
// ─────────────────────────────────────────────────────────────
function buildSlide(data) {
  var work   = data.work;
  var imgUrl = data.imgUrl;
  var artist = getArtist(work);
  var parts  = [];
  if (work.creation_date) parts.push(work.creation_date);
  if (work.culture)       parts.push(work.culture);
  if (work.technique)     parts.push(work.technique);
  var meta = parts.join(' \u00B7 ');
  var raw  = (work.tombstone || work.description || '').replace(/<[^>]*>/g,'').trim();
  var desc = raw.length > 320 ? raw.slice(0,317) + '\u2026' : raw;
  var cmaUrl = work.url || ('https://www.clevelandart.org/art/' + (work.accession_number || ''));

  var el = document.createElement('div');
  el.className   = 'slide';
  el.dataset.url = cmaUrl;

  var html = '<div class="slide-img-wrap"><img src="' + esc(imgUrl) + '" alt="' + esc(work.title||'') + '"></div>'
           + '<div class="slide-vignette"></div>'
           + '<div class="slide-gradient"></div>'
           + '<div class="slide-desc">';
  if (work.department) html += '<div class="desc-dept">'   + esc(work.department)         + '</div>';
  html +=                      '<div class="desc-title">'  + esc(work.title || 'Untitled') + '</div>';
  if (artist) html +=          '<div class="desc-artist">' + esc(artist)                  + '</div>';
  if (meta)   html +=          '<div class="desc-meta">'   + esc(meta)                    + '</div>';
  if (desc)   html +=          '<div class="desc-text">'   + esc(desc)                    + '</div>';
  html += '</div>';
  el.innerHTML = html;
  return el;
}

// ─────────────────────────────────────────────────────────────
// Show slide
// ─────────────────────────────────────────────────────────────
function showSlide(idx) {
  for (var i = 0; i < slides.length; i++) slides[i].classList.toggle('active', i === idx);
  currentIdx = idx;
  updateDots();
  resetClock();
  var sl   = slides[idx];
  var link = document.getElementById('cma-link');
  if (sl && sl.dataset.url) { link.href = sl.dataset.url; link.style.display = 'block'; }
  preloadAhead();
}

// ─────────────────────────────────────────────────────────────
// Preload 2 ahead
// ─────────────────────────────────────────────────────────────
function preloadAhead() {
  if (preloading) return;
  preloading = true;
  var cap = activeDept;
  function loop() {
    if (cap !== activeDept)          { preloading = false; return; }
    if (slides.length > currentIdx + 2) { preloading = false; return; }
    fetchRandomWork()
      .then(function(data) {
        if (cap !== activeDept) { preloading = false; return; }
        var s = buildSlide(data);
        slides.push(s);
        document.getElementById('stage').appendChild(s);
        updateDots();
        loop();
      })
      .catch(function() { setTimeout(loop, 2500); });
  }
  loop();
}

// ─────────────────────────────────────────────────────────────
// Next slide
// ─────────────────────────────────────────────────────────────
function nextSlide() {
  var next = currentIdx + 1;
  if (next < slides.length) { showSlide(next); return; }
  fetchRandomWork()
    .then(function(data) {
      var s = buildSlide(data);
      slides.push(s);
      document.getElementById('stage').appendChild(s);
      showSlide(slides.length - 1);
    })
    .catch(function(e) { console.error('nextSlide failed', e); });
}

// ─────────────────────────────────────────────────────────────
// Filter
// ─────────────────────────────────────────────────────────────
function setFilter(el) {
  var newDept = el.getAttribute('data-dept');
  if (newDept === activeDept) return;
  var chips = document.querySelectorAll('.filter-chip');
  for (var i = 0; i < chips.length; i++) chips[i].classList.remove('active');
  el.classList.add('active');
  activeDept = newDept;

  var ov = document.getElementById('switching-overlay');
  ov.classList.add('visible');
  preloading = false;
  for (var j = 0; j < slides.length; j++) slides[j].remove();
  slides = []; currentIdx = -1;
  clearInterval(timerID);

  fetchRandomWork()
    .then(function(f) {
      return fetchRandomWork().then(function(s) { return { first:f, second:s }; });
    })
    .then(function(b) {
      var stage = document.getElementById('stage');
      var s1 = buildSlide(b.first);
      var s2 = buildSlide(b.second);
      slides.push(s1, s2);
      stage.appendChild(s1); stage.appendChild(s2);
      ov.classList.remove('visible');
      showSlide(0); startTimer();
    })
    .catch(function() { ov.classList.remove('visible'); });
}

// ─────────────────────────────────────────────────────────────
// Clock
// ─────────────────────────────────────────────────────────────
function resetClock() {
  secondsLeft = DURATION;
  renderClock();
}
function renderClock() {
  var frac   = secondsLeft / DURATION;
  var offset = CIRC * (1 - frac);
  document.getElementById('clock-arc').style.strokeDashoffset = offset;
  var m = Math.floor(secondsLeft / 60);
  var s = secondsLeft % 60;
  document.getElementById('clock-label').textContent = m + ':' + padTwo(s);
  var bar = document.getElementById('progress-bar');
  bar.style.WebkitTransition = 'none'; bar.style.transition = 'none';
  bar.style.WebkitTransform  = 'scaleX(' + frac + ')'; bar.style.transform = 'scaleX(' + frac + ')';
}
function startTimer() {
  clearInterval(timerID);
  timerID = setInterval(function() {
    if (isPaused) return;
    secondsLeft = Math.max(0, secondsLeft - 1);
    var frac   = secondsLeft / DURATION;
    var offset = CIRC * (1 - frac);
    document.getElementById('clock-arc').style.strokeDashoffset = offset;
    var m = Math.floor(secondsLeft / 60);
    var s = secondsLeft % 60;
    document.getElementById('clock-label').textContent = m + ':' + padTwo(s);
    var bar = document.getElementById('progress-bar');
    bar.style.WebkitTransition = 'transform 1s linear'; bar.style.transition = 'transform 1s linear';
    bar.style.WebkitTransform  = 'scaleX(' + frac + ')'; bar.style.transform = 'scaleX(' + frac + ')';
    if (secondsLeft === 0) nextSlide();
  }, 1000);
}

// ─────────────────────────────────────────────────────────────
// Pause
// ─────────────────────────────────────────────────────────────
function togglePause() {
  isPaused = !isPaused;
  document.getElementById('pause-overlay').classList.toggle('visible', isPaused);
  document.getElementById('pause-icon').innerHTML = isPaused
    ? '<polygon points="5 3 19 12 5 21 5 3"/>'
    : '<rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>';
}

// ─────────────────────────────────────────────────────────────
// Dots
// ─────────────────────────────────────────────────────────────
function updateDots() {
  var badge   = document.getElementById('dots');
  var total   = slides.length;
  var visible = Math.min(total, 8);
  var start   = Math.max(0, currentIdx - Math.floor(visible / 2));
  badge.innerHTML = '';
  for (var i = start; i < Math.min(start + visible, total); i++) {
    var dot = document.createElement('div');
    dot.className = 'dot' + (i === currentIdx ? ' active' : '');
    (function(idx) { dot.onclick = function() { if (idx < slides.length) showSlide(idx); }; })(i);
    badge.appendChild(dot);
  }
}

// ─────────────────────────────────────────────────────────────
// Keyboard
// ─────────────────────────────────────────────────────────────
document.addEventListener('keydown', function(e) {
  if (e.keyCode === 32) { e.preventDefault(); togglePause(); }
  if (e.keyCode === 39) nextSlide();
});

// ─────────────────────────────────────────────────────────────
// Loading helpers
// ─────────────────────────────────────────────────────────────
function setMsg(msg) {
  var el = document.getElementById('loading-msg');
  el.textContent = msg; el.className = '';
}
function showError(msg) {
  var el = document.getElementById('loading-msg');
  el.textContent = msg; el.className = 'error';
  document.getElementById('btn-retry').style.display = 'block';
}
function hideLoader() {
  var el = document.getElementById('loading-screen');
  el.classList.add('fade-out');
  setTimeout(function() { el.style.display = 'none'; }, 900);
}

// ─────────────────────────────────────────────────────────────
// Init
// ─────────────────────────────────────────────────────────────
function init() {
  var loader = document.getElementById('loading-screen');
  loader.style.display = 'flex'; loader.style.opacity = '1';
  loader.classList.remove('fade-out');
  document.getElementById('btn-retry').style.display = 'none';
  setMsg('Opening the Collection\u2026');

  for (var i = 0; i < slides.length; i++) slides[i].remove();
  slides = []; currentIdx = -1; isPaused = false;
  clearInterval(timerID); preloading = false;

  setMsg('Fetching artwork 1 of 2\u2026');

  fetchRandomWork()
    .then(function(first) {
      setMsg('Fetching artwork 2 of 2\u2026');
      return fetchRandomWork().then(function(second) {
        return { first: first, second: second };
      });
    })
    .then(function(both) {
      var stage = document.getElementById('stage');
      var s1 = buildSlide(both.first);
      var s2 = buildSlide(both.second);
      slides.push(s1, s2);
      stage.appendChild(s1); stage.appendChild(s2);
      hideLoader();
      showSlide(0);
      startTimer();
    })
    .catch(function(err) {
      console.error('Init error:', err);
      showError('Could not connect to the CMA API. Check network access to openaccess-api.clevelandart.org');
    });
}

init();
</script>
