<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Collection — Cleveland Museum of Art</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=Outfit:wght@200;300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0c0c0b;
    --gold: #BFA06A;
    --gold-dim: rgba(191,160,106,0.4);
    --cream: #EDE8DF;
    --muted: rgba(237,232,223,0.4);
    --subtle: rgba(237,232,223,0.12);
    --font-serif: 'EB Garamond', Georgia, serif;
    --font-sans: 'Outfit', sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }

  body {
    background: var(--bg);
    color: var(--cream);
    font-family: var(--font-sans);
    font-weight: 300;
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
    user-select: none;
  }

  /* ── HEADER ── */
  header {
    position: fixed; top: 0; left: 0; right: 0; z-index: 50;
    display: flex; align-items: center; justify-content: space-between;
    padding: 1.4rem 2.5rem;
    background: linear-gradient(to bottom, rgba(12,12,11,0.92) 0%, transparent 100%);
  }

  .logo {
    font-family: var(--font-serif);
    font-size: 0.95rem;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--gold);
  }
  .logo sub {
    display: block;
    font-family: var(--font-sans);
    font-size: 0.58rem;
    letter-spacing: 0.35em;
    color: var(--muted);
    font-style: normal;
    margin-top: 3px;
    font-weight: 300;
  }

  .header-right { display: flex; align-items: center; gap: 1.5rem; }

  .clock-wrap { position: relative; width: 44px; height: 44px; }
  .clock-svg { width: 44px; height: 44px; transform: rotate(-90deg); }
  .clock-track { fill: none; stroke: var(--subtle); stroke-width: 1.5; }
  .clock-fill {
    fill: none; stroke: var(--gold); stroke-width: 1.5; stroke-linecap: round;
    stroke-dasharray: 119.38;
    stroke-dashoffset: 0;
    transition: stroke-dashoffset 1s linear;
  }
  .clock-text {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.6rem; font-weight: 300; color: var(--gold); letter-spacing: 0.05em;
  }

  .ctrl-btn {
    background: none; border: 1px solid var(--subtle);
    color: var(--muted); width: 36px; height: 36px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: all 0.25s; border-radius: 50%;
  }
  .ctrl-btn:hover { border-color: var(--gold-dim); color: var(--gold); }

  /* ── STAGE ── */
  #stage {
    flex: 1; position: relative; overflow: hidden;
    display: flex; align-items: center; justify-content: center;
  }

  .slide {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    opacity: 0; transition: opacity 1.2s ease;
  }
  .slide.active { opacity: 1; }

  .slide-img-wrap {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    background: #0a0a09;
  }
  .slide-img-wrap img {
    max-width: 100%; max-height: 100%;
    width: auto; height: auto;
    object-fit: contain; display: block;
  }

  .slide-vignette {
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at center, transparent 45%, rgba(12,12,11,0.6) 100%);
    pointer-events: none;
  }
  .slide-gradient {
    position: absolute; bottom: 0; left: 0; right: 0; height: 50%;
    background: linear-gradient(to top, rgba(12,12,11,0.97) 0%, rgba(12,12,11,0.65) 40%, transparent 100%);
    pointer-events: none;
  }

  /* ── DESCRIPTION ── */
  .slide-desc {
    position: absolute; bottom: 0; left: 0; right: 0;
    padding: 2.5rem 5rem 2.5rem;
    text-align: center; z-index: 10;
  }

  .desc-dept {
    font-size: 0.6rem; letter-spacing: 0.35em; text-transform: uppercase;
    color: var(--gold); margin-bottom: 0.6rem;
    opacity: 0; transform: translateY(8px);
    transition: opacity 0.6s 0.3s ease, transform 0.6s 0.3s ease;
  }
  .desc-title {
    font-family: var(--font-serif);
    font-size: clamp(1.5rem, 3vw, 2.8rem); font-weight: 400; line-height: 1.2;
    margin-bottom: 0.4rem; color: var(--cream);
    opacity: 0; transform: translateY(10px);
    transition: opacity 0.65s 0.45s ease, transform 0.65s 0.45s ease;
  }
  .desc-artist {
    font-family: var(--font-serif); font-style: italic;
    font-size: clamp(0.9rem, 1.5vw, 1.2rem); color: var(--gold); margin-bottom: 0.5rem;
    opacity: 0; transform: translateY(8px);
    transition: opacity 0.6s 0.55s ease, transform 0.6s 0.55s ease;
  }
  .desc-meta {
    font-size: 0.7rem; letter-spacing: 0.12em; color: var(--muted); margin-bottom: 0.75rem;
    opacity: 0; transform: translateY(6px);
    transition: opacity 0.6s 0.65s ease, transform 0.6s 0.65s ease;
  }
  .desc-text {
    max-width: 640px; margin: 0 auto;
    font-family: var(--font-serif);
    font-size: clamp(0.85rem, 1.2vw, 1rem); line-height: 1.75;
    color: rgba(237,232,223,0.6);
    opacity: 0; transform: translateY(6px);
    transition: opacity 0.6s 0.75s ease, transform 0.6s 0.75s ease;
  }

  .slide.active .desc-dept,
  .slide.active .desc-title,
  .slide.active .desc-artist,
  .slide.active .desc-meta,
  .slide.active .desc-text { opacity: 1; transform: translateY(0); }

  /* ── PROGRESS BAR ── */
  #progress-bar {
    position: fixed; bottom: 0; left: 0;
    height: 2px; background: var(--gold);
    width: 100%; transform-origin: left; transform: scaleX(1);
  }

  /* ── LOADING SCREEN ── */
  #loading-screen {
    position: fixed; inset: 0; z-index: 200;
    background: var(--bg);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 1.5rem;
    transition: opacity 0.8s ease;
  }
  #loading-screen.fade-out { opacity: 0; pointer-events: none; }

  .loading-logo {
    font-family: var(--font-serif);
    font-size: 2.5rem; font-weight: 400;
    letter-spacing: 0.2em; color: var(--gold); text-transform: uppercase;
  }
  .loading-bar-wrap {
    width: 200px; height: 1px;
    background: var(--subtle); position: relative; overflow: hidden;
  }
  .loading-bar {
    position: absolute; top: 0; left: -100%;
    width: 100%; height: 100%; background: var(--gold);
    animation: load-sweep 1.4s ease-in-out infinite;
  }
  @keyframes load-sweep { 0% { left: -100%; } 100% { left: 100%; } }

  #loading-label {
    font-size: 0.65rem; letter-spacing: 0.3em;
    text-transform: uppercase; color: var(--muted);
    text-align: center; max-width: 360px; line-height: 1.8;
  }
  #loading-label.error { color: #e07070; text-transform: none; font-size: 0.75rem; }

  #btn-retry {
    display: none;
    background: none; border: 1px solid var(--gold-dim);
    color: var(--gold); padding: 0.65rem 1.75rem;
    font-family: var(--font-sans); font-size: 0.7rem;
    letter-spacing: 0.2em; text-transform: uppercase;
    cursor: pointer; transition: all 0.25s; margin-top: 0.5rem;
  }
  #btn-retry:hover { background: var(--gold-dim); }

  /* ── DOTS ── */
  #counter-badge {
    position: fixed; top: 50%; right: 2rem;
    transform: translateY(-50%);
    display: flex; flex-direction: column; align-items: center; gap: 0.5rem;
    z-index: 20;
  }
  .counter-dot {
    width: 5px; height: 5px; border-radius: 50%;
    background: var(--subtle); transition: background 0.3s, transform 0.3s;
    cursor: pointer;
  }
  .counter-dot.active { background: var(--gold); transform: scale(1.4); }
  .counter-dot:hover { background: var(--gold-dim); }

  /* ── FOOTER LINKS ── */
  #next-hint {
    position: fixed; bottom: 1.5rem; right: 2.5rem;
    font-size: 0.62rem; letter-spacing: 0.2em; text-transform: uppercase;
    color: var(--muted); display: flex; align-items: center; gap: 0.6rem;
    cursor: pointer; transition: color 0.25s; z-index: 20;
  }
  #next-hint:hover { color: var(--gold); }

  #cma-link {
    position: fixed; bottom: 1.5rem; left: 2.5rem;
    font-size: 0.62rem; letter-spacing: 0.2em; text-transform: uppercase;
    color: var(--muted); text-decoration: none; z-index: 20;
    transition: color 0.25s; display: none;
  }
  #cma-link:hover { color: var(--gold); }

  /* ── PAUSE OVERLAY ── */
  #pause-overlay {
    position: fixed; inset: 0; z-index: 30;
    display: flex; align-items: center; justify-content: center;
    pointer-events: none; opacity: 0; transition: opacity 0.3s;
  }
  #pause-overlay.visible { opacity: 1; }
  .pause-icon {
    width: 64px; height: 64px;
    background: rgba(12,12,11,0.75); border: 1px solid var(--gold-dim);
    border-radius: 50%; display: flex; align-items: center; justify-content: center;
    font-size: 1.4rem;
  }
</style>
</head>
<body>

<!-- LOADING -->
<div id="loading-screen">
  <div class="loading-logo">CMA</div>
  <div class="loading-bar-wrap" id="loading-bar-wrap"><div class="loading-bar"></div></div>
  <div id="loading-label">Opening the Collection…</div>
  <button id="btn-retry" onclick="init()">Try Again</button>
</div>

<!-- HEADER -->
<header>
  <div class="logo">
    Cleveland Museum of Art
    <sub>Open Collection · Digital Gallery</sub>
  </div>
  <div class="header-right">
    <div class="clock-wrap">
      <svg class="clock-svg" viewBox="0 0 44 44">
        <circle class="clock-track" cx="22" cy="22" r="19"/>
        <circle class="clock-fill" id="clock-arc" cx="22" cy="22" r="19"/>
      </svg>
      <div class="clock-text" id="clock-label">2:00</div>
    </div>
    <button class="ctrl-btn" id="btn-pause" title="Pause (Space)" onclick="togglePause()">
      <svg id="pause-icon" width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
        <rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>
      </svg>
    </button>
    <button class="ctrl-btn" title="Next (→)" onclick="nextSlide()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="9 18 15 12 9 6"/>
      </svg>
    </button>
  </div>
</header>

<!-- STAGE -->
<div id="stage"></div>

<!-- PROGRESS BAR -->
<div id="progress-bar"></div>

<!-- DOTS -->
<div id="counter-badge"></div>

<div id="next-hint" onclick="nextSlide()">
  Next Work
  <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
    <polyline points="9 18 15 12 9 6"/>
  </svg>
</div>
<a id="cma-link" href="#" target="_blank">View on CMA ↗</a>

<div id="pause-overlay"><div class="pause-icon">⏸</div></div>

<script>
// ─────────────────────────────────────────────────────────────
// Config
// ─────────────────────────────────────────────────────────────
const DURATION = 120;   // seconds per slide
const CIRC     = 2 * Math.PI * 19;  // SVG circumference for r=19
const API      = 'https://openaccess-api.clevelandart.org/api/artworks/';

// ─────────────────────────────────────────────────────────────
// State
// ─────────────────────────────────────────────────────────────
let slides      = [];
let currentIdx  = -1;
let isPaused    = false;
let secondsLeft = DURATION;
let timerID     = null;

// ─────────────────────────────────────────────────────────────
// Network helpers
// ─────────────────────────────────────────────────────────────
function fetchWithTimeout(url, ms) {
  const ctrl = new AbortController();
  const timer = setTimeout(() => ctrl.abort(), ms);
  return fetch(url, { signal: ctrl.signal }).finally(() => clearTimeout(timer));
}

function preloadImg(src) {
  return new Promise(resolve => {
    const i = new Image();
    i.onload  = () => resolve(true);
    i.onerror = () => resolve(false);
    setTimeout(() => resolve(false), 10000);
    i.src = src;
  });
}

function bestImage(work) {
  const im = work && work.images;
  if (!im) return null;
  return (im.web && im.web.url) || (im.full && im.full.url) || (im.thumb && im.thumb.url) || null;
}

function getArtist(work) {
  if (!work.creators || !work.creators.length) return work.culture || '';
  return work.creators.map(function(c){ return c.description || c.name || ''; }).filter(Boolean).join(', ');
}

function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ─────────────────────────────────────────────────────────────
// Fetch a random work that has a loadable image
// ─────────────────────────────────────────────────────────────
async function fetchRandomWork() {
  for (var attempt = 0; attempt < 8; attempt++) {
    try {
      var skip = Math.floor(Math.random() * 48000);
      var url  = API + '?has_image=1&limit=1&skip=' + skip;
      var resp = await fetchWithTimeout(url, 12000);
      if (!resp.ok) continue;
      var data = await resp.json();
      var work = data.data && data.data[0];
      if (!work) continue;
      var imgUrl = bestImage(work);
      if (!imgUrl) continue;
      var ok = await preloadImg(imgUrl);
      if (!ok) continue;
      return { work: work, imgUrl: imgUrl };
    } catch(e) {
      // timeout or network error — try again
    }
  }
  throw new Error('Could not load a work after 8 attempts');
}

// ─────────────────────────────────────────────────────────────
// Build a slide DOM node
// ─────────────────────────────────────────────────────────────
function buildSlide(data) {
  var work   = data.work;
  var imgUrl = data.imgUrl;
  var artist = getArtist(work);
  var meta   = [work.creation_date, work.culture, work.technique].filter(Boolean).join(' · ');
  var raw    = (work.tombstone || work.description || '').replace(/<[^>]*>/g, '').trim();
  var desc   = raw.length > 300 ? raw.slice(0, 297) + '…' : raw;
  var cmaUrl = work.url || ('https://www.clevelandart.org/art/' + work.accession_number);

  var el = document.createElement('div');
  el.className   = 'slide';
  el.dataset.url = cmaUrl;
  el.innerHTML   =
    '<div class="slide-img-wrap"><img src="' + esc(imgUrl) + '" alt="' + esc(work.title||'') + '" draggable="false"/></div>' +
    '<div class="slide-vignette"></div>' +
    '<div class="slide-gradient"></div>' +
    '<div class="slide-desc">' +
      (work.department ? '<div class="desc-dept">' + esc(work.department) + '</div>' : '') +
      '<div class="desc-title">'  + esc(work.title || 'Untitled') + '</div>' +
      (artist ? '<div class="desc-artist">' + esc(artist) + '</div>' : '') +
      (meta   ? '<div class="desc-meta">'   + esc(meta)   + '</div>' : '') +
      (desc   ? '<div class="desc-text">'   + esc(desc)   + '</div>' : '') +
    '</div>';
  return el;
}

// ─────────────────────────────────────────────────────────────
// Show a slide by index
// ─────────────────────────────────────────────────────────────
function showSlide(idx) {
  slides.forEach(function(s, i){ s.classList.toggle('active', i === idx); });
  currentIdx = idx;
  updateDots();

  var link = document.getElementById('cma-link');
  var url  = slides[idx] && slides[idx].dataset.url;
  if (url) { link.href = url; link.style.display = 'block'; }

  resetClock();
  preloadAhead();
}

// ─────────────────────────────────────────────────────────────
// Silently preload 2 slides ahead
// ─────────────────────────────────────────────────────────────
var preloading = false;
async function preloadAhead() {
  if (preloading) return;
  preloading = true;
  while (slides.length <= currentIdx + 2) {
    try {
      var data  = await fetchRandomWork();
      var slide = buildSlide(data);
      slides.push(slide);
      document.getElementById('stage').appendChild(slide);
      updateDots();
    } catch(e) {
      await new Promise(function(r){ setTimeout(r, 2000); });
    }
  }
  preloading = false;
}

// ─────────────────────────────────────────────────────────────
// Next slide
// ─────────────────────────────────────────────────────────────
async function nextSlide() {
  var next = currentIdx + 1;
  if (next < slides.length) {
    showSlide(next);
    return;
  }
  // not yet loaded — fetch on demand
  try {
    var data  = await fetchRandomWork();
    var slide = buildSlide(data);
    slides.push(slide);
    document.getElementById('stage').appendChild(slide);
    showSlide(slides.length - 1);
  } catch(e) {
    console.error('nextSlide fetch failed', e);
  }
}

// ─────────────────────────────────────────────────────────────
// Clock & progress bar
// ─────────────────────────────────────────────────────────────
function resetClock() {
  secondsLeft = DURATION;
  renderClock();
}

function renderClock() {
  var frac   = secondsLeft / DURATION;
  var offset = CIRC * (1 - frac);
  document.getElementById('clock-arc').style.strokeDashoffset = offset;
  var m = Math.floor(secondsLeft / 60);
  var s = secondsLeft % 60;
  document.getElementById('clock-label').textContent = m + ':' + (s < 10 ? '0' : '') + s;

  var bar = document.getElementById('progress-bar');
  bar.style.transition = 'none';
  bar.style.transform  = 'scaleX(' + frac + ')';
  requestAnimationFrame(function(){
    bar.style.transition = 'transform 1s linear';
  });
}

function startTimer() {
  clearInterval(timerID);
  timerID = setInterval(function() {
    if (isPaused) return;
    secondsLeft = Math.max(0, secondsLeft - 1);
    var frac   = secondsLeft / DURATION;
    var offset = CIRC * (1 - frac);
    document.getElementById('clock-arc').style.strokeDashoffset = offset;
    var m = Math.floor(secondsLeft / 60);
    var s = secondsLeft % 60;
    document.getElementById('clock-label').textContent = m + ':' + (s < 10 ? '0' : '') + s;
    document.getElementById('progress-bar').style.transform = 'scaleX(' + frac + ')';
    if (secondsLeft === 0) nextSlide();
  }, 1000);
}

// ─────────────────────────────────────────────────────────────
// Pause / resume
// ─────────────────────────────────────────────────────────────
function togglePause() {
  isPaused = !isPaused;
  document.getElementById('pause-overlay').classList.toggle('visible', isPaused);
  document.getElementById('pause-icon').innerHTML = isPaused
    ? '<polygon points="5 3 19 12 5 21 5 3"/>'
    : '<rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>';
}

// ─────────────────────────────────────────────────────────────
// Dots
// ─────────────────────────────────────────────────────────────
function updateDots() {
  var badge   = document.getElementById('counter-badge');
  var total   = slides.length;
  var visible = Math.min(total, 8);
  var start   = Math.max(0, currentIdx - Math.floor(visible / 2));
  badge.innerHTML = '';
  for (var i = start; i < Math.min(start + visible, total); i++) {
    var dot = document.createElement('div');
    dot.className = 'counter-dot' + (i === currentIdx ? ' active' : '');
    (function(idx){ dot.addEventListener('click', function(){ if (idx < slides.length) showSlide(idx); }); })(i);
    badge.appendChild(dot);
  }
}

// ─────────────────────────────────────────────────────────────
// Keyboard
// ─────────────────────────────────────────────────────────────
document.addEventListener('keydown', function(e) {
  if (e.code === 'Space')      { e.preventDefault(); togglePause(); }
  if (e.code === 'ArrowRight') nextSlide();
});

// ─────────────────────────────────────────────────────────────
// Loading UI helpers
// ─────────────────────────────────────────────────────────────
function setLoadingMsg(msg) {
  document.getElementById('loading-label').textContent = msg;
  document.getElementById('loading-label').classList.remove('error');
}

function showError(msg) {
  document.getElementById('loading-label').textContent = msg;
  document.getElementById('loading-label').classList.add('error');
  document.getElementById('loading-bar-wrap').style.display = 'none';
  document.getElementById('btn-retry').style.display = 'block';
}

function hideLoader() {
  var el = document.getElementById('loading-screen');
  el.classList.add('fade-out');
  setTimeout(function(){ el.style.display = 'none'; }, 900);
}

// ─────────────────────────────────────────────────────────────
// Init
// ─────────────────────────────────────────────────────────────
async function init() {
  // Reset UI
  var loader = document.getElementById('loading-screen');
  loader.style.display  = 'flex';
  loader.style.opacity  = '1';
  loader.classList.remove('fade-out');
  document.getElementById('loading-bar-wrap').style.display = 'block';
  document.getElementById('btn-retry').style.display = 'none';
  setLoadingMsg('Opening the Collection…');

  // Clear old slides
  slides.forEach(function(s){ s.remove(); });
  slides = []; currentIdx = -1; isPaused = false;
  clearInterval(timerID);

  try {
    setLoadingMsg('Fetching artwork 1 of 2…');
    var first = await fetchRandomWork();

    setLoadingMsg('Fetching artwork 2 of 2…');
    var second = await fetchRandomWork();

    var stage = document.getElementById('stage');
    var s1 = buildSlide(first);
    var s2 = buildSlide(second);
    slides.push(s1, s2);
    stage.appendChild(s1);
    stage.appendChild(s2);

    hideLoader();
    showSlide(0);
    startTimer();

  } catch(err) {
    console.error('Init error:', err);
    showError(
      'Could not load artworks from the CMA API.\n' +
      'Please save this file and open it directly in your browser (not via Claude preview).\n' +
      'Then click Try Again.'
    );
  }
}

init();
</script>
</body>
</html>
